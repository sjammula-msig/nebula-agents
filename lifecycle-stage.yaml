version: 1
# Framework-local lifecycle for nebula-agents itself.
# Distinct from any downstream product's {PRODUCT_ROOT}/lifecycle-stage.yaml.
# Consumed only by nebula-agents local validation and CI.
current_stage: framework-bootstrap
release_posture:
  mode: public-preview-human-orchestrated
  summary: >
    Framework repo split from gajakannan/nebula-crm at commit
    d2fa37c4216147b7a0be399e4133dac59ef75d9f on 2026-04-20.
    Standalone framework in public preview; framework-only gates enforced.
stages:
  framework-bootstrap:
    description: Framework scaffolding and boundary hardening; no product runtime required.
    required_gates:
      - boundary_genericness
      - skill_regression
      - agent_map_schema
      - prompt_drift
      - action_spec_schema
      - contract_conformance
  planning:
    description: Framework-side planning of new actions, roles, or templates.
    required_gates:
      - boundary_genericness
      - skill_regression
      - agent_map_schema
      - prompt_drift
      - action_spec_schema
      - contract_conformance
  implementation:
    description: Framework-side implementation of new actions, roles, or templates.
    required_gates:
      - boundary_genericness
      - skill_regression
      - agent_map_schema
      - prompt_drift
      - action_spec_schema
      - contract_conformance
  release-readiness:
    description: Framework release hardening before publishing a new tagged version.
    required_gates:
      - boundary_genericness
      - skill_regression
      - agent_map_schema
      - prompt_drift
      - action_spec_schema
      - contract_conformance
gates:
  boundary_genericness:
    description: Prevent solution-specific leakage into generic framework agents. Embedded denylist is authoritative; --glossary override is optional.
    command:
      - python3
      - agents/scripts/validate-genericness.py
  prompt_drift:
    description: Committed generated evidence-contract prompts must match what render-prompts.py produces from the action policy (F0007-S0006). Fails on drift or a hand edit to a generated file.
    command:
      - python3
      - agents/scripts/render-prompts.py
      - --check
  action_spec_schema:
    description: Validate the versioned action policy — JSON Schema, semantic invariants, and manifest-version resolution (F0007-S0001).
    command:
      - python3
      - agents/scripts/validate_action_specs.py
  contract_conformance:
    description: Independent conformance invariants plus the historical baseline matrix for the action policy (F0007-S0002). Catches a weakened contract even when generated output matches.
    command:
      - python3
      - agents/scripts/contract-conformance.py
  skill_regression:
    description: Validate skill metadata, structure quality, and routing regressions.
    command:
      - python3
      - agents/scripts/run-skill-regression.py
  agent_map_schema:
    description: Validate agent-map.yaml model_tier/execution annotations (Phase 3a) — valid tiers, known execution values, a sequential fallback for parallel actions, and no vendor model ids.
    command:
      - python3
      - agents/scripts/validate_agent_map.py
