version: 0
status: seed
purpose: >
  Lightweight typed vocabulary for Nebula solution context. Shared cross-feature
  semantics are declared once here so prompts can pass stable IDs and links
  instead of re-reading broad prose every session.

authority:
  raw_artifacts_win: true
  precedence:
    - target feature folder and feature-assembly-plan.md for feature-local implementation intent
    - planning-mds/architecture/decisions/** for architectural decisions
    - planning-mds/api/*.yaml and planning-mds/schemas/*.json for interface and payload contracts
    - planning-mds/architecture/data-model.md and planning-mds/domain/glossary.md for domain definitions
    - planning-mds/knowledge-graph/*.yaml for compressed retrieval and routing
  drift_policy:
    - Do not silently let ontology mappings outrank raw artifacts.
    - If a source document is wrong, fix the source document first.
    - If the source document is correct and the ontology is stale, repair the ontology in the same change set.

ownership:
  architect:
    owns:
      - entity
      - glossary_term
      - workflow
      - workflow_state
      - capability
      - endpoint
      - ui_route
      - event
      - config_key
      - migration
      - role
      - policy_rule
      - schema
      - api_contract
      - adr
  product-manager:
    owns:
      - feature
      - story
      - persona
      - feature_story_mappings
  implementation_agents:
    owns: []
    duties:
      - Flag ontology drift when discovered during implementation.
      - Do not redefine canonical shared semantics unless explicitly operating in Architect or Product Manager mode.

node_types:
  - id: entity
    description: Canonical domain or append-only business record used across features.
    owner: architect
  - id: workflow
    description: Cross-feature lifecycle or operating flow with shared meaning.
    owner: architect
  - id: workflow_state
    description: Canonical state within a declared workflow.
    owner: architect
  - id: glossary_term
    description: Shared business vocabulary term anchored in the domain glossary.
    owner: architect
  - id: capability
    description: Shared runtime, UI, operational, or platform capability used across features.
    owner: architect
  - id: endpoint
    description: Shared API endpoint surface used for build-time routing into handlers and tests.
    owner: architect
  - id: ui_route
    description: Shared frontend route or page surface used for UI routing and page-level work.
    owner: architect
  - id: event
    description: Shared audit, timeline, or workflow event emitted by solution behavior.
    owner: architect
  - id: config_key
    description: Shared runtime configuration key or published operational configuration surface.
    owner: architect
  - id: migration
    description: Database migration or schema-shaping implementation artifact tied to feature rollout.
    owner: architect
  - id: role
    description: Authorization role enforced by identity and policy artifacts.
    owner: architect
  - id: policy_rule
    description: Resource and action authorization rule governed by policy artifacts.
    owner: architect
  - id: schema
    description: Shared JSON Schema contract.
    owner: architect
  - id: api_contract
    description: Shared API contract, usually OpenAPI.
    owner: architect
  - id: adr
    description: Architecture decision record governing shared design choices.
    owner: architect
  - id: feature
    description: Product planning container and delivery scope.
    owner: product-manager
  - id: story
    description: User story or implementation slice within a feature.
    owner: product-manager
  - id: persona
    description: User or operator role referenced by planning artifacts.
    owner: product-manager
  - id: evidence
    description: Verification or signoff artifact proving completion or review.
    owner: product-manager

provenance:
  description: >
    Optional annotation on edge references to indicate how the link was
    established. When omitted, the edge is treated as extracted (ground truth).
  values:
    - id: extracted
      description: >
        Ground truth derived from committed code, docs, or configuration.
        This is the default when provenance is omitted.
    - id: inferred
      description: >
        Speculative or analyst-inferred link. Must include a confidence
        score (0.0–1.0). validate.py warns on confidence < 0.5.
      fields:
        confidence: { type: float, range: [0.0, 1.0], required: true }
    - id: ambiguous
      description: >
        Link whose correctness is uncertain — flagged for architect review.
        validate.py always warns on ambiguous edges.
  syntax: >
    Edge references accept two forms:
      - Bare string (default): "entity:submission" — treated as extracted.
      - Object form: { id: "entity:submission", provenance: "inferred", confidence: 0.7 }
    Both forms may be mixed in the same list.

rationale:
  description: >
    Optional annotation on canonical nodes that captures WHY a design decision
    was made, linking to the governing ADR and section. Makes architectural
    reasoning first-class and queryable through lookup.py rather than locked
    in ADR prose.
  fields:
    adr: { type: string, required: true, description: "Canonical ADR node ID (e.g. adr:009)." }
    section: { type: string, required: true, description: "Human-readable section anchor within the ADR (e.g. 'Decision §2')." }
    summary: { type: string, required: true, description: "One-line summary of the WHY — the reasoning, not a restatement of what the node is." }
  syntax: >
    rationale is a list of objects on any canonical node:
      rationale:
        - adr: adr:009
          section: "Decision §2"
          summary: "Per-status SLA thresholds needed for aging band computation."
    Each entry must reference a valid ADR ID from canonical-nodes.yaml.

edge_types:
  - id: belongs_to_feature
    from: [story]
    to: [feature]
    description: Story is scoped under a feature.
  - id: affects
    from: [feature, story]
    to: [entity, glossary_term, workflow, workflow_state, capability, endpoint, ui_route, event, config_key, migration]
    description: Target scope changes or depends on the behavior of the destination node.
  - id: governs
    from: [adr]
    to: [entity, glossary_term, workflow, workflow_state, capability, endpoint, ui_route, event, config_key, migration, role, policy_rule, schema, api_contract, feature, story]
    description: ADR is the governing architectural decision for the destination node.
  - id: uses_schema
    from: [feature, story]
    to: [schema]
    description: Scope reads, writes, or validates against the schema.
  - id: uses_api_contract
    from: [feature, story]
    to: [api_contract]
    description: Scope depends on or changes the API contract.
  - id: belongs_to_workflow
    from: [workflow_state]
    to: [workflow]
    description: State belongs to the named workflow.
  - id: transitions_to
    from: [workflow_state]
    to: [workflow_state]
    description: Allowed transition within a single workflow.
  - id: depends_on
    from: [feature, story]
    to: [feature, story, entity, glossary_term, workflow, capability, endpoint, ui_route, event, config_key, migration, role, policy_rule]
    description: Scope requires the destination node or scope to exist or stay aligned.
  - id: restricted_to_role
    from: [feature, story, capability]
    to: [role]
    description: Scope is primarily performed by or explicitly constrained to the destination role.
  - id: enforced_by_policy
    from: [feature, story, capability]
    to: [policy_rule]
    description: Scope is gated or shaped by the destination authorization rule.
  - id: validated_by
    from: [feature, story]
    to: [evidence]
    description: Execution or review evidence proving behavior or signoff.
  - id: supersedes
    from: [feature, story, adr]
    to: [feature, story, adr]
    description: Newer scope replaces the destination node.

id_patterns:
  - type: entity
    pattern: entity:<slug>
    examples:
      - entity:submission
      - entity:workflow-sla-threshold
  - type: workflow
    pattern: workflow:<slug>
    examples:
      - workflow:submission
      - workflow:renewal
  - type: glossary_term
    pattern: glossary_term:<slug>
    examples:
      - glossary_term:quote
      - glossary_term:line-of-business
  - type: workflow_state
    pattern: state:<workflow-slug>:<state-slug>
    examples:
      - state:submission:ready-for-uw-review
      - state:renewal:identified
  - type: schema
    pattern: schema:<filename-without-.schema.json>
    examples:
      - schema:submission-transition-request
      - schema:broker
  - type: capability
    pattern: capability:<slug>
    examples:
      - capability:dashboard-home
      - capability:frontend-quality-gates
  - type: endpoint
    pattern: endpoint:<slug>
    examples:
      - endpoint:submission-transition
      - endpoint:dashboard-kpis
  - type: ui_route
    pattern: ui_route:<slug>
    examples:
      - ui_route:submissions-list
      - ui_route:dashboard-home
  - type: event
    pattern: event:<slug>
    examples:
      - event:submission-created
      - event:renewal-transitioned
  - type: config_key
    pattern: config_key:<slug>
    examples:
      - config_key:workflow-sla-thresholds
      - config_key:oidc-authority
  - type: migration
    pattern: migration:<slug>
    examples:
      - migration:f0006-submission-intake-columns
      - migration:f0007-renewal-entity-shape-reconcile
  - type: role
    pattern: role:<slug>
    examples:
      - role:distribution-user
      - role:broker-user
  - type: policy_rule
    pattern: policy_rule:<slug>
    examples:
      - policy_rule:renewal-transition
      - policy_rule:dashboard-nudge-read
  - type: api_contract
    pattern: api:<slug>
    examples:
      - api:nebula-rest
  - type: adr
    pattern: adr:<number-or-slug>
    examples:
      - adr:011
      - adr:014-search
      - adr:014-workflow-sla
  - type: feature
    pattern: feature:FNNNN
    examples:
      - feature:F0006
      - feature:F0032
  - type: story
    pattern: story:FNNNN-SNNNN
    examples:
      - story:F0006-S0004
      - story:F0007-S0003

invariants:
  - ADRs, schemas, workflows, workflow states, capabilities, API contracts, and canonical entities are shared solution nodes; features and stories only reference them.
  - Endpoints, UI routes, events, config keys, migrations, and glossary terms exist to tighten build-time routing; they should stay compact and point to authoritative docs or code surfaces instead of duplicating them.
  - Persona is a planning-facing actor label; role and policy_rule are enforcement-facing authorization nodes.
  - Glossary terms complement raw glossary definitions for retrieval and naming consistency; they do not replace `planning-mds/domain/glossary.md`.
  - Workflow states belong to workflows, not to features.
  - A feature or story must not appear to own an ADR, capability, or schema.
  - The ontology should store compact typed links, not re-copy whole PRDs or ADR text.
  - When coverage is partial, prompts must fall back to file-centric reads instead of inventing missing links.

retrieval_contract:
  when_feature_or_story_is_mapped:
    - Load solution-ontology.yaml first.
    - Load canonical-nodes.yaml second.
    - Load only the matching feature or story entry from feature-mappings.yaml.
    - Load code-index.yaml when implementation file routing or reverse lookup is needed.
    - Expand one hop into linked canonical nodes.
    - Open raw feature, ADR, API, or schema files only when linked, changed, or needed for detail or verification.
  minimum_prompt_block:
    - target
    - affects
    - restricted_to_role
    - enforced_by_policy
    - governed_by
    - uses_schema
    - uses_api_contract
    - depends_on
    - validated_by
    - supersedes
    - code_paths
    - source_precedence
