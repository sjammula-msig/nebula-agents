node_bindings:
  - id: capability:native-session-preflight
    paths:
      runtime:
        application:
          - engine/src/nebula_agents/application/preflight.py
        infrastructure:
          - engine/src/nebula_agents/infrastructure/config.py
          - engine/src/nebula_agents/infrastructure/process.py
          - engine/src/nebula_agents/infrastructure/providers.py
        tests:
          - engine/tests/unit/test_preflight.py
          - engine/tests/unit/test_runtime_config_identity_policy.py
          - engine/tests/integration/test_process_and_providers.py
  - id: capability:tmux-session-lifecycle
    paths:
      runtime:
        application:
          - engine/src/nebula_agents/application/ports.py
          - engine/src/nebula_agents/application/runs.py
        infrastructure:
          - engine/src/nebula_agents/infrastructure/tmux.py
        presentation:
          - engine/src/nebula_agents/presentation/session_entry.py
        composition:
          - engine/src/nebula_agents/bootstrap.py
        tests:
          - engine/tests/unit/test_tmux_adapter.py
          - engine/tests/integration/test_bootstrap.py
          - engine/tests/integration/test_commit_reconciliation.py
          - engine/tests/integration/test_real_tmux_lifecycle.py
  - id: capability:local-run-registry
    paths:
      runtime:
        application:
          - engine/src/nebula_agents/application/authorization.py
        domain:
          - engine/src/nebula_agents/domain/enums.py
          - engine/src/nebula_agents/domain/errors.py
          - engine/src/nebula_agents/domain/models.py
          - engine/src/nebula_agents/domain/path_contracts.py
          - engine/src/nebula_agents/domain/transitions.py
        infrastructure:
          - engine/src/nebula_agents/infrastructure/filesystem_store.py
          - engine/src/nebula_agents/infrastructure/identity.py
          - engine/src/nebula_agents/infrastructure/policy_store.py
          - engine/src/nebula_agents/infrastructure/schema_registry.py
        tests:
          - engine/tests/unit/test_authorization.py
          - engine/tests/unit/test_models.py
          - engine/tests/unit/test_transitions.py
          - engine/tests/integration/test_filesystem_store.py
  - id: capability:evidence-and-gate-control
    paths:
      runtime:
        application:
          - engine/src/nebula_agents/application/gates.py
        infrastructure:
          - engine/src/nebula_agents/infrastructure/watcher.py
        tests:
          - engine/tests/unit/test_application_services.py
          - engine/tests/unit/test_watcher_validator.py
          - engine/tests/integration/test_story_validator_descriptor_boundary.py
  - id: capability:redacted-transcript-recovery
    paths:
      runtime:
        application:
          - engine/src/nebula_agents/application/transcripts.py
        domain:
          - engine/src/nebula_agents/domain/redaction.py
        infrastructure:
          - engine/src/nebula_agents/infrastructure/transcript.py
          - engine/src/nebula_agents/infrastructure/transcript_filter_entry.py
        presentation:
          - engine/src/nebula_agents/presentation/transcript_filter.py
        tests:
          - engine/tests/security/test_redaction.py
          - engine/tests/security/test_session_entry.py
          - engine/tests/integration/test_transcript_adapter.py
          - engine/tests/integration/test_transcript_filter.py
  - id: capability:read-only-run-queries
    paths:
      runtime:
        application:
          - engine/src/nebula_agents/application/queries.py
        presentation:
          - engine/src/nebula_agents/presentation/cli.py
          - engine/src/nebula_agents/presentation/formatters.py
          - engine/src/nebula_agents/presentation/interop.py
          - engine/src/nebula_agents/presentation/tui.py
        tests:
          - engine/tests/contract/**
          - engine/tests/unit/test_tui_actions.py
          - engine/tests/unit/test_tui_behavioral_coverage.py
          - engine/tests/security/test_presentation_boundary_edges.py
          - engine/tests/security/test_static_execution_boundary.py
  - id: capability:compiled-kg-projection
    paths:
      tooling:
        compiler:
          - scripts/kg/*.py
          - scripts/kg/README.md
          - scripts/kg/generated_paths.yaml
        tests:
          - scripts/kg/tests/**/*.py
        extractors:
          - scripts/kg/csharp-symbols/*.cs
          - scripts/kg/csharp-symbols/*.csproj
          - scripts/kg/ts-symbols/*.js
          - scripts/kg/ts-symbols/*.json
          - scripts/kg/ts-symbols/*.yaml
        source:
          - planning-mds/kg-source/**
        schemas:
          - planning-mds/schemas/kg-source/**
