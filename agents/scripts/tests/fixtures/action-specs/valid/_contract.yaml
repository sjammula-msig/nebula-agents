# Minimal valid active contract fixture (synthetic dates, decoupled from the
# shipped policy). Rejection-case tests copy this tree and mutate one field.
active_version: "2025-02-01"
history_dir: history
shared:
  contract_effective_date: "2025-02-01"
  run_id_format: "YYYY-MM-DD-[a-z0-9]{8}"
  run_id_suffix:
    argv: [python3, -c, "import secrets; print(secrets.token_hex(4))"]
  run_id_forbidden: [uuid4]
  base_run_files: [README.md, commands.log]
  artifacts_subdirs: [coverage, diffs]
  commands_log_schema:
    fields: [schema_version, timestamp, command, exit_code]
  coverage_min_pct: 80
  context_preamble: [agents/ROUTER.md]
  requirements:
    security_scans_required: true
    kg_reconciliation_required: true
    kg_generated_regen_required: false
    compile_projection_contract: false
