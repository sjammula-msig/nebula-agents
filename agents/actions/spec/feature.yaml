# Active action specification: feature (single governed vertical slice).
#
# FAITHFUL encoding of the Feature Evidence Contract (see agents/actions/feature.md
# and CONSUMER-CONTRACT.md). Fixed procedure is data here; judgment is free-text
# `judgment`/`notes` (rendered into prompts, never executed). render-prompts.py
# compiles both prompt variants from this file; run prompt_drift after any edit.
action: feature
action_doc: agents/actions/feature.md
contract:
  name: Feature Evidence Contract
  scope: feature-completion
  version: "2026-07-11"

run_id:
  scheme: contract
  var: RUN_ID

inputs:
  required:
    - {name: FEATURE_ID, format: "F####"}
  optional:
    - {name: MODE, enum: [clean, drift-reconcile], default: clean}
    - {name: SLICE_ORDER_SOURCE, enum: [assembly-plan, override], default: assembly-plan}
    - {name: SLICE_ORDER, required_when: "SLICE_ORDER_SOURCE=override"}
    - {name: PRODUCT_ROOT, default: sister-repo}

auto_resolved:
  FEATURE_SLUG: "kebab-case slug for {FEATURE_ID} from REGISTRY.md"
  FEATURE_PATH: "{PRODUCT_ROOT}/planning-mds/features/{FEATURE_ID}-{FEATURE_SLUG}"
  ARCHIVE_FEATURE_PATH: "{PRODUCT_ROOT}/planning-mds/features/archive/{FEATURE_ID}-{FEATURE_SLUG}"
  FEATURE_INDEX_ROOT: "{PRODUCT_ROOT}/planning-mds/operations/evidence/features/{FEATURE_ID}-{FEATURE_SLUG}"
  RUN_FOLDER: "{PRODUCT_ROOT}/planning-mds/operations/evidence/runs/{RUN_ID}"
  RUN_ID_PRIOR: "prior approved run_id from {FEATURE_INDEX_ROOT}/latest-run.json (null if absent)"
  RERUN_OF: "null, or {RUN_ID_PRIOR} when this run regenerates evidence only"

retrieval:
  tier_defaults: {clean: [1, 2], drift-reconcile: [3, 4]}

context_load:
  - "agents/ROUTER.md"
  - "agents/agent-map.yaml"
  - "agents/docs/AGENT-USE.md"
  - "agents/actions/feature.md"
  - "python3 {PRODUCT_ROOT}/scripts/kg/lookup.py {FEATURE_ID} --tier {start_tier} --run-id {RUN_ID}"
  - "{FEATURE_PATH}"

ownership:
  product-manager: [pm-closeout.md, signoff-ledger.md, latest-run.json, "STATUS.md final state", "trackers + archive move", "manifest finalize (status approved)", "prior-manifest supersession"]
  architect: [feature-assembly-plan.md, g0-assembly-plan-validation.md, kg-reconciliation.md, "ADRs", "canonical shared semantics", "API contracts + schemas"]
  quality-engineer: [test-plan.md, test-execution-report.md, coverage-report.md]
  code-reviewer: [code-review-report.md]
  security: [security-review-report.md]
  devops: [g1-runtime-preflight.md, g2-deployability-check.md]

gates:
  - id: G0
    title: Architect assembly plan authoring and validation
    role: architect
    artifacts: [g0-assembly-plan-validation.md]
    manifest_status_after: in-progress
    operations:
      - run:
          id: validate-g0
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}", --stage, G0]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      Step 0 (author): if PRIMARY_SPEC (feature-assembly-plan.md) is absent, author it from the
      template using the feature stories, BLUEPRINT.md, SOLUTION-PATTERNS.md, and API contracts; on
      drift-reconcile/rerun, reconcile the existing plan instead of overwriting. Step 0.5 (validate):
      check scope split, agent dependencies, integration checkpoints, and artifact ownership, and
      initialize the Required Signoff Roles matrix in STATUS.md. Flip manifest status to in-progress
      after G0 passes.

  - id: G1
    title: Runtime preflight
    role: devops
    artifacts: [g1-runtime-preflight.md]
    operations:
      - run:
          id: validate-g1
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}", --stage, G1]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      Write g1-runtime-preflight.md when runtime_bearing=true; otherwise record the manifest omission.

  - id: G2
    title: Self-review, QE, and deployability
    role: quality-engineer
    artifacts: [g2-self-review.md, test-plan.md, test-execution-report.md, coverage-report.md, g2-deployability-check.md]
    operations:
      - run:
          id: validate-g2
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}", --stage, G2]
          cwd: framework
          timeout_seconds: 600
    judgment: |
      Reconcile the manifest conditional booleans against discovered scope FIRST (see
      notes.scope_booleans). Any false->true flip forces the corresponding required role and artifact.
      coverage-report.md must exist even when waived. Booleans that change after G2 force re-running G2.
      Coverage floor is `coverage_min_pct` (owned by _contract.yaml); do not restate the number.
      Keep the STATUS.md Story x Role Progress matrix current (see notes.story_progress): flip each
      story's Backend/Frontend/AI cell as its slice is built and QA/DevOps when its tests/deployability pass.

  - id: G3
    title: Code and security review (parallel)
    role: code-reviewer
    artifacts: [code-review-report.md, security-review-report.md]
    operations:
      - run:
          id: validate-g3
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}", --stage, G3]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      Code Reviewer and Security Reviewer run in parallel. security-review-report.md is required when
      security_sensitive_scope=true or Security is required in STATUS.md. Record each story's Code Review
      and Security cell (PASS/FAIL) in the STATUS.md Story x Role Progress matrix.

  - id: G4
    title: Approval
    role: product-manager
    artifacts: [gate-decisions.md]
    operations:
      - run:
          id: validate-g4
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}", --stage, G4]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      Approval requires critical=0; any high requires an explicit mitigation token recorded in
      gate-decisions.md. Compute the allowed outcome with gate_policy.py (profile `standard`).

  - id: G5
    title: Signoff
    role: product-manager
    artifacts: [signoff-ledger.md]
    operations:
      - run:
          id: validate-g5
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}", --stage, G5]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      Every Required=Yes role records verdict, reviewer, ISO date, and an evidence path under
      RUN_FOLDER. A `WITH RECOMMENDATIONS` verdict must satisfy all five §15 closeout-passing conditions
      in the underlying role report (non-blocking/deferred, severity, owner+follow-up, named PM
      acceptance, no blocking language with a passing verdict).

  - id: G6
    title: Candidate evidence validation
    role: quality-engineer
    artifacts: [feature-action-execution.md]
    operations:
      - run:
          id: validate-g6
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}", --stage, G6]
          cwd: framework
          timeout_seconds: 300
      - run:
          id: validate-trackers-g6
          argv: [python3, agents/product-manager/scripts/validate-trackers.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}"]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      Pre-closeout candidate: no pm_closeout, no tracker_sync, no latest-run.json yet. Confirm G0–G5
      evidence present and passing; changed_paths[] populated; conditional booleans cross-check against
      the §7 path-class globs; non-required absent artifacts appear in manifest omissions[].

  - id: G7
    title: Architect knowledge-graph reconciliation
    role: architect
    role_switch: agents/architect/SKILL.md
    artifacts: [kg-reconciliation.md]
    operations:
      - run:
          id: kg-compile
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/compile.py"]
          cwd: product
          timeout_seconds: 300
          mutates: [kg-source, kg-projection]
      - run:
          id: kg-symbols-decisions
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py", --regenerate-symbols, --check-symbols,
                 --regenerate-decisions, --check-decisions]
          cwd: product
          timeout_seconds: 300
          mutates: [kg-projection]
      - run:
          id: kg-check-drift
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py", --check-drift]
          cwd: product
          timeout_seconds: 300
    constraints:
      - forbid: "--write-coverage-report"
        reason: "path-sensitive; deferred to G8 after the archive move relocates evidence paths"
    judgment: |
      MUST switch role (read agents/architect/SKILL.md). Bind the as-built source into the SEMANTIC
      graph via kg-source/bindings/** and kg-source/nodes/** shards, then compile.py regenerates the
      projection trio + tracker regions — never hand-edit knowledge-graph/*.yaml. CODE paths only
      (stable across the G8 archive move). Manifest stays in-progress; record gate_results.kg_reconciliation.

  - id: G8
    title: PM closeout
    role: product-manager
    role_switch: agents/product-manager/SKILL.md
    artifacts: [pm-closeout.md]
    operations:
      - checkpoint:
          id: archive-move
          description: "VERIFY (do not re-author) the G7 graph, update trackers (STATUS/REGISTRY/ROADMAP/BLUEPRINT + kg-source feature shard), and move the feature folder to its archived path when Done/Completed."
          requires: [pm-closeout.md, signoff-ledger.md, kg-reconciliation.md]
          produces: [archived-feature-folder]
      - run:
          id: kg-compile-closeout
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/compile.py"]
          cwd: product
          timeout_seconds: 300
          mutates: [kg-source, kg-projection, trackers]
      - run:
          id: patch-prior-manifest
          argv: [python3, agents/product-manager/scripts/patch-prior-manifest.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --new-run-id, "{RUN_ID}"]
          cwd: framework
          timeout_seconds: 120
          mutates: [prior-manifest]
      - write:
          artifact: latest-run.json
          after: patch-prior-manifest
          mutates: [latest-run.json]
      - run:
          id: kg-write-coverage
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py", --write-coverage-report]
          cwd: product
          timeout_seconds: 300
          mutates: [kg-projection]
      - run:
          id: kg-check-drift-closeout
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py", --check-drift]
          cwd: product
          timeout_seconds: 300
      - run:
          id: validate-closeout
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --stage, closeout]
          cwd: framework
          timeout_seconds: 300
      - run:
          id: validate-trackers-closeout
          argv: [python3, agents/product-manager/scripts/validate-trackers.py,
                 --product-root, "{PRODUCT_ROOT}", --feature, "{FEATURE_ID}", --run-id, "{RUN_ID}"]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      MUST switch role (read agents/product-manager/SKILL.md). Manifest status becomes `approved` only
      here, when latest-run.json is written — and only after patch-prior-manifest.py exits 0. Run
      --write-coverage-report ONLY after the archive move (path-sensitive). Finalize the manifest
      (status approved, feature_state Done/Completed/Archived, feature_path_at_closeout resolved).

severity_gate: standard

variants: [operator-friendly, automation-safe]

forbidden:
  - "Generate RUN_ID with uuid4 or any non-contract format."
  - "Write or consume current-run.json."
  - "Write latest-run.json before G8 final validation passes."
  - "Leave a prior approved manifest at status approved after writing a new approval."
  - "Skip per-gate validate-feature-evidence.py --stage calls."
  - "Write terminal-feature role reports into FEATURE_PATH instead of RUN_FOLDER."
  - "Cite the global frontend evidence lane as a substitute for a feature-level role report."
  - "Hand-enumerate schema/ADR/contract files when lookup output is available."
  - "Treat lookup/KG mappings as authoritative over raw artifacts."
  - "Edit code without prior hint.py, or shared semantics without prior blast.py."
  - "Skip any gate G0 through G8, or declare Done without the PM role switch at G8."
  - "Widen scope outside FEATURE_ID, or pass --evidence-effective-date earlier than the framework default."

stop_conditions:
  - "Runtime preflight cannot be restored."
  - "A critical code or security finding persists after one review cycle."
  - "Required signoff is missing reviewer, date, or evidence."
  - "A canonical node edit is attempted outside the Architect role."
  - "Scope drifts outside FEATURE_ID."
  - "validate.py or validate.py --check-drift cannot be auto-repaired."
  - "validate-feature-evidence.py at any stage exits non-zero and the cause is not addressable in this run."
  - "Two approved manifests are detected for the same feature without supersession."
  - "INSUFFICIENT_CONTEXT occurs — escalate, open raw artifacts, do not proceed on weak matches."

conflict_resolution:
  - "raw artifact vs KG mapping -> raw wins; repair KG in the same change set."
  - "feature-assembly-plan vs story text -> plan wins; log via workstate.py decision --topic plan-story-reconcile."
  - "code vs contract/policy/KG -> reconcile to contract; never silently redefine canonical semantics."
  - "shared-semantics change detected -> halt and route to Architect."
  - "STATUS.md story value not in the feature's local breakdown -> fix STATUS.md (STORY-INDEX.md is cross-check only)."
  - "manifest conditional boolean false but changed_paths has a forced path class -> set the boolean true and add the required role/artifact."

notes:
  concurrent_run_check: |
    Before starting, inspect only evidence-manifest.json files under
    {PRODUCT_ROOT}/planning-mds/operations/evidence/runs/*/ for any run other than RUN_FOLDER whose
    manifest has feature_id={FEATURE_ID} and status draft or in-progress. If one exists, HALT and
    reconcile externally — the contract assumes serial feature actions per feature. Acceptable prior
    states: approved (superseded at G8), superseded, or no prior runs.
  session_setup: |
    Echo the resolved absolute {PRODUCT_ROOT} on the first turn before any command. Create
    FEATURE_INDEX_ROOT, RUN_FOLDER, and RUN_FOLDER/artifacts/{coverage,diffs,test-results,security,
    screenshots}. Initialize evidence-manifest.json (status draft, contract version stamped, all
    required keys, skeleton gate_results/role_results/files). Create the base run files and touch empty
    commands.log and lifecycle-gates.log. Capture a prior latest-run.json run_id as RUN_ID_PRIOR.
  telemetry: |
    Append every shell command to RUN_FOLDER/commands.log via append-command-log.py (--log,
    --product-root, --framework-root, --cwd, --command, --exit-code, repeatable --artifact). Artifact
    paths must be durable product-repo paths under artifacts/; scratch paths (/tmp/...) are not
    durable. Do not leak secrets — secret-pattern checks fail the run.
  scope_booleans: |
    At G2 set frontend_in_scope=true when any changed_paths[] entry matches experience/** frontend
    globs; runtime_bearing=true for engine/** runtime/tests/AI-runtime globs; deployment_config_changed
    =true for Dockerfile/compose/.github-workflows/ci/env/config/migration globs; security_sensitive_
    scope=true for auth/identity/permissions/security/secrets globs.
  validator_defect_flow: |
    If a validator defect blocks closeout, prefer to fix the validator and re-run. Mid-stage (G0..G6)
    defects are logged as open follow-ups in README.md (not waivers yet); if unresolved at G8, record a
    waivers.validator_defect entry in the manifest and mirror it in pm-closeout.md. Never bypass with an
    earlier-than-default --evidence-effective-date.
  story_progress: |
    Maintain the `## Story x Role Progress` matrix in {FEATURE_PATH}/STATUS.md live as the run
    progresses (advisory, not validator-enforced). Cells: not-started / in-progress / done / not-in-scope;
    review columns (Code Review, Security) resolve to PASS/FAIL. At G2 flip each story's Backend/Frontend/AI
    cell in-progress->done as its slice is built, and QA/DevOps when that story's tests/deployability pass.
    At G3 resolve the Code Review and Security cells per story. Roll up the Overall column (Done only when
    every required cell is Done/PASS) and keep it consistent with the Story Checklist. Cells marked
    not-in-scope follow the manifest scope booleans (AI = slice AI/LLM scope; DevOps = deployment_config_
    changed/runtime_bearing; Security = security_sensitive_scope). At G8 the PM verifies the matrix is
    complete and consistent before finalizing story status.
