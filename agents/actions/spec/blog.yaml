# Active action specification: blog (development logs / technical articles / amplification).
#
# FAITHFUL encoding of the blog action under the Feature Evidence Contract (see
# agents/actions/blog.md and CONSUMER-CONTRACT.md). blog produces editorial content OUTSIDE
# the feature evidence contract: no role reports, not evidence for any completed feature, not
# required by any validator. It still produces a base run package per §8 so the run is
# auditable — scope base-run-only. render-prompts.py compiles both prompt variants from this
# file; run prompt_drift after any edit.
action: blog
action_doc: agents/actions/blog.md
contract:
  name: Feature Evidence Contract
  scope: base-run-only
  version: "2026-07-11"

run_id:
  scheme: contract
  var: BLOG_RUN_ID

inputs:
  required:
    - {name: POST_TYPE, enum: [devlog, technical-article, release-post, retrospective, other]}
    - {name: TARGET_PATH, format: "path to where the post will be written"}
  optional:
    - {name: AMPLIFICATION, enum: [none, phase-2], default: none}
    - {name: FEATURE_REF, format: "F#### — optional context ref; does NOT make this a feature-scoped run"}
    - {name: PRODUCT_ROOT, default: sister-repo}

auto_resolved:
  BLOG_RUN_FOLDER: "{PRODUCT_ROOT}/planning-mds/operations/evidence/runs/{BLOG_RUN_ID}"
  FEATURE_REF_SLUG: "kebab-case slug for {FEATURE_REF} from REGISTRY.md (only when FEATURE_REF is set)"
  FEATURE_REF_PATH: "{PRODUCT_ROOT}/planning-mds/features/{FEATURE_REF}-{FEATURE_REF_SLUG} (only when FEATURE_REF is set)"

context_load:
  - "agents/ROUTER.md"
  - "agents/agent-map.yaml"
  - "agents/docs/AGENT-USE.md"
  - "agents/actions/blog.md"
  - "agents/blogger/SKILL.md"
  - "for FEATURE_REF (read-only context): {FEATURE_REF_PATH}/README.md, PRD.md, feature-assembly-plan.md; if archived, that feature's pm-closeout.md"

ownership:
  blogger: ["the post and its channel derivatives (the user owns approval)"]

gates:
  - id: B0
    title: Discovery
    role: blogger
    judgment: |
      Conversational: the agent asks, recommends, and aligns with the user on subject, angle, and audience
      before any brief.

  - id: B1
    title: Editorial brief
    role: blogger
    operations:
      - checkpoint:
          id: editorial-brief
          description: "The user approves the editorial brief before any drafting begins."
          requires: ["subject context and the proposed angle/audience from B0"]
          produces: ["approved editorial brief (gate-decisions.md)"]
    judgment: |
      Do not draft before this brief is approved.

  - id: B2
    title: Draft
    role: blogger
    judgment: |
      Write the primary post into TARGET_PATH.

  - id: B3
    title: Self-review gate
    role: blogger
    judgment: |
      Accuracy and quality check. When FEATURE_REF is set, cross-check feature status, dates, and decisions
      against REGISTRY.md and the feature's pm-closeout.md — never misrepresent them. Stop if self-review finds
      factual errors that cannot be resolved against the source artifacts.

  - id: B4
    title: Editorial gate
    role: blogger
    operations:
      - checkpoint:
          id: editorial-gate
          description: "The user reviews and approves the post. Do not publish or amplify before this gate passes."
          requires: ["the drafted post at TARGET_PATH"]
          produces: ["editorial approval (gate-decisions.md)"]

  - id: B5
    title: Amplification (optional Phase 2)
    role: blogger
    judgment: |
      Only when AMPLIFICATION=phase-2: produce the channel derivatives. Skip this gate when AMPLIFICATION=none
      (gate-decisions.md then records B0..B4).

severity_gate: none

variants: [operator-friendly, automation-safe]

forbidden:
  - "Generate BLOG_RUN_ID with uuid4."
  - "Write into any feature evidence package (####-*/)."
  - "Cite a blog post as evidence for a completed terminal feature."
  - "Draft before the EDITORIAL BRIEF gate (B1)."
  - "Publish or amplify before the EDITORIAL GATE (B4)."
  - "Misrepresent feature status, dates, or decisions (cross-check REGISTRY.md and pm-closeout.md when FEATURE_REF is set)."

stop_conditions:
  - "The user refuses the EDITORIAL BRIEF."
  - "Self-review identifies factual errors that cannot be resolved against source artifacts."
  - "The user refuses the EDITORIAL GATE."

conflict_resolution:
  - "a blog assertion disagrees with REGISTRY.md/STATUS.md/pm-closeout.md -> the registry/closeout wins; fix the post."
  - "a blog assertion disagrees with code -> code wins; do not publish content that misleads."

notes:
  session_setup: |
    Echo the resolved absolute {PRODUCT_ROOT} on the first turn. Mint BLOG_RUN_ID once in contract format (an
    ISO YYYY-MM-DD date plus a secrets.token_hex(4) suffix); never uuid4. Create {BLOG_RUN_FOLDER} and
    initialize the six §8 base run files.
  evidence_outputs: |
    In {BLOG_RUN_FOLDER}: README.md (Run Summary = "Blog run", Status, Evidence Index pointing to TARGET_PATH
    and any amplification artifacts, Validation Summary, Open Follow-ups); action-context.md (Scope Boundaries =
    "Editorial content; not feature evidence", Lifecycle Stage = "Blog"); artifact-trace.md (TARGET_PATH + any
    channel derivative paths); gate-decisions.md (B0..B5, or B0..B4 when AMPLIFICATION=none); commands.log. The
    post and its derivatives land at TARGET_PATH and the amplification destinations.
  exit_validation: |
    No validators are required — blog content is not gated by feature evidence validators. Confirm
    gate-decisions.md records all B0..B5 (or B0..B4 when AMPLIFICATION=none).
  telemetry: |
    Append every shell command to {BLOG_RUN_FOLDER}/commands.log per the §13 JSONL schema (schema_version,
    timestamp with timezone, cwd, command, exit_code, artifacts[], redactions[]).
