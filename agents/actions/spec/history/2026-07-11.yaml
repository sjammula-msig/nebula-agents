# IMMUTABLE, fully-resolved historical policy bundle. DO NOT EDIT after
# publication. Interprets evidence whose contract_effective_date is on/after
# 2026-07-11. Compiled-projection contract (F0006): the graph is authored as
# kg-source/** shards and the projection trio + trackers are regenerated via
# compile.py — KG_COMPILE_PROJECTION_EFFECTIVE_DATE.
#
# This is the newest published version; _contract.yaml:active_version must equal
# it (validate_action_specs.py enforces the tie).
version: 2026-07-11
effective_from: 2026-07-11
description: Compiled-projection contract (kg-source shards + compile.py).
shared:
  contract_effective_date: 2026-07-11
  run_id_format: "YYYY-MM-DD-[a-z0-9]{8}"
  run_id_suffix:
    argv: [python3, -c, "import secrets; print(secrets.token_hex(4))"]
  run_id_forbidden: [uuid4]
  base_run_files:
    - README.md
    - action-context.md
    - artifact-trace.md
    - gate-decisions.md
    - commands.log
    - lifecycle-gates.log
  artifacts_subdirs: [coverage, diffs, test-results, security, screenshots]
  commands_log_schema:
    fields: [schema_version, timestamp, cwd, command, exit_code, artifacts, redactions]
  coverage_min_pct: 80
  context_preamble:
    - agents/ROUTER.md
    - agents/agent-map.yaml
    - agents/docs/AGENT-USE.md
  requirements:
    security_scans_required: true
    required_security_scan_classes: [dependency, secrets, sast, dast]
    kg_reconciliation_required: true
    kg_generated_regen_required: true
    compile_projection_contract: true
actions:
  feature:
    scope: feature-completion
    gates:
      - {id: G0, role: architect, required_artifacts: [g0-assembly-plan-validation.md]}
      - {id: G1, role: devops, required_artifacts: []}
      - {id: G2, role: quality-engineer, required_artifacts: [g2-self-review.md, test-plan.md, test-execution-report.md, coverage-report.md, g2-deployability-check.md]}
      - {id: G3, role: code-reviewer, required_artifacts: [code-review-report.md, security-review-report.md]}
      - {id: G4, role: product-manager, required_artifacts: []}
      - {id: G5, role: product-manager, required_artifacts: [signoff-ledger.md]}
      - {id: G6, role: quality-engineer, required_artifacts: [feature-action-execution.md]}
      - {id: G7, role: architect, required_artifacts: [kg-reconciliation.md]}
      - {id: G8, role: product-manager, required_artifacts: [pm-closeout.md]}
