# Active action specification: init (bootstrap a new product).
#
# FAITHFUL encoding of the init action under the Feature Evidence Contract (see
# agents/actions/init.md and CONSUMER-CONTRACT.md). init runs BEFORE any feature exists,
# so there is no feature evidence package to produce; it still produces a base run package
# per §8 so the bootstrap itself is auditable — so its scope is base-run-only.
# render-prompts.py compiles both prompt variants from this file; run prompt_drift after edits.
action: init
action_doc: agents/actions/init.md
contract:
  name: Feature Evidence Contract
  scope: base-run-only
  version: "2026-07-11"

run_id:
  scheme: contract
  var: INIT_RUN_ID

inputs:
  required:
    - {name: PROJECT_NAME, format: "string"}
    - {name: DOMAIN_DESCRIPTION, format: "1-2 sentence summary"}
    - {name: TARGET_USERS, format: "[role, role, ...]"}
    - {name: CORE_ENTITIES, format: "[entity, entity, ...]"}
  optional:
    - {name: PRODUCT_ROOT, default: "NEBULA_PRODUCT_ROOT env var, or sister-repo ../<product-repo>"}

auto_resolved:
  INIT_RUN_FOLDER: "{PRODUCT_ROOT}/planning-mds/operations/evidence/runs/{INIT_RUN_ID}"

context_load:
  - "agents/ROUTER.md"
  - "agents/agent-map.yaml"
  - "agents/docs/AGENT-USE.md"
  - "agents/actions/init.md"
  - "agents/product-manager/SKILL.md (initialization mode)"
  - "agents/templates/** (templates for the scaffolded files)"

ownership:
  product-manager: ["every scaffolded file (initialization mode)"]

gates:
  - id: I0
    title: Project inputs captured
    role: product-manager
    artifacts: [action-context.md]
    judgment: |
      Record PROJECT_NAME, DOMAIN_DESCRIPTION, TARGET_USERS, and CORE_ENTITIES in action-context.md
      (Lifecycle Stage = "Init", Scope Boundaries = "Bootstrap only").

  - id: I1
    title: PRODUCT_ROOT scaffold
    role: product-manager
    judgment: |
      Confirm {PRODUCT_ROOT} is empty or a new repo willing to accept scaffolded files (do not scaffold into a
      non-empty root without explicit operator confirmation), then create the canonical directory structure.

  - id: I2
    title: BLUEPRINT template
    role: product-manager
    artifacts: [BLUEPRINT.md]
    judgment: |
      Produce {PRODUCT_ROOT}/planning-mds/BLUEPRINT.md from the template.

  - id: I3
    title: Registry + roadmap
    role: product-manager
    artifacts: [REGISTRY.md, ROADMAP.md]
    judgment: |
      Produce REGISTRY.md with EMPTY Active/Planned/Archived/Retired sections and ROADMAP.md with EMPTY
      Now/Next/Later/Completed sections. Never pre-populate the Archived or Retired tables.

  - id: I4
    title: Evidence infrastructure
    role: product-manager
    judgment: |
      Create planning-mds/operations/evidence/ with a README explaining base run vs feature profile vs global
      lanes (§§7, 8, 9, 20) and a Path Class Extensions section (§7) EMPTY by default. If the product's intended
      top-level layout differs from the framework defaults (engine/, experience/) — e.g. a monorepo using
      apps/api/, apps/web/, or services/ — the operator MUST populate Path Class Extensions before the first
      feature action; init emits an info notice when BLUEPRINT.md mentions a non-default layout and the
      extensions section is still empty. The Evidence Contract Effective Date must be the framework default
      (2026-05-19) or later — never earlier.

  - id: I5
    title: KG infrastructure
    role: product-manager
    judgment: |
      Create planning-mds/knowledge-graph/ with empty solution-ontology.yaml, canonical-nodes.yaml,
      feature-mappings.yaml, and code-index.yaml.

  - id: I6
    title: Validator sanity
    role: product-manager
    operations:
      - run:
          id: i6-validate-trackers
          argv: [python3, agents/product-manager/scripts/validate-trackers.py]
          cwd: framework
          timeout_seconds: 300
      - run:
          id: i6-validate-feature-evidence
          argv: [python3, agents/product-manager/scripts/validate-feature-evidence.py,
                 --product-root, "{PRODUCT_ROOT}"]
          cwd: framework
          timeout_seconds: 300
      - run:
          id: i6-kg-check-symbols
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py", --check-symbols]
          cwd: product
          timeout_seconds: 300
      - run:
          id: i6-kg-check-drift
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py", --check-drift]
          cwd: product
          timeout_seconds: 300
      - run:
          id: i6-validate-templates
          argv: [python3, agents/scripts/validate_templates.py]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      Run all validators against the freshly-scaffolded empty product; each must exit 0 (this is also the exit
      validation sweep). The registry-wide validate-feature-evidence scan should report 0 governed features and
      0 retired records. Any non-zero exit means the root cause must be fixed before init can complete.

severity_gate: none

variants: [operator-friendly, automation-safe]

forbidden:
  - "Generate INIT_RUN_ID with uuid4."
  - "Scaffold into a non-empty {PRODUCT_ROOT} without explicit operator confirmation."
  - "Skip the evidence directory bootstrap — the product must have planning-mds/operations/evidence/ ready for the first feature run."
  - "Pre-populate REGISTRY.md with non-empty Archived or Retired tables; both start empty."
  - "Set the Evidence Contract Effective Date earlier than the framework default (must be 2026-05-19 or later for new products)."

stop_conditions:
  - "The operator refuses to confirm scaffolding into a non-empty {PRODUCT_ROOT}."
  - "Any validator exits non-zero at I6 (fix the root cause before init can complete)."
  - "INSUFFICIENT_CONTEXT for any required input."

conflict_resolution:
  - "operator wants an effective date earlier than the framework default -> refuse; new products inherit the framework default at minimum."
  - "operator wants to backfill historical features during init -> out of scope for init; init creates an empty registry only."

notes:
  session_setup: |
    Resolve {PRODUCT_ROOT} per agents/docs/AGENT-USE.md (operator input, the NEBULA_PRODUCT_ROOT env var, or the
    default ../<product-repo>) and echo the resolved absolute path. Confirm it is empty or a new repo accepting
    scaffold. Mint INIT_RUN_ID once in contract format (an ISO YYYY-MM-DD date plus a secrets.token_hex(4)
    suffix); never uuid4. Create {INIT_RUN_FOLDER} (after scaffolding lands operations/evidence/) and initialize
    the six §8 base run files.
  preconditions: |
    nebula-agents is checked out and is the current session working directory; {PRODUCT_ROOT} is resolved and
    either empty or accepting scaffold; the operator has basic project context (domain, goals, target users,
    initial entities).
  evidence_readme: |
    The product's planning-mds/operations/evidence/README.md gets the sections Base Run Profile (§8), Feature
    Evidence Profile (§9), and Global Lanes (§20), plus a Path Class Extensions section (§7) that starts empty —
    the operator fills product-specific globs there after I4 for non-default layouts.
  telemetry: |
    Append every shell command to {INIT_RUN_FOLDER}/commands.log per the §13 JSONL schema (schema_version,
    timestamp with timezone, cwd, command, exit_code, artifacts[], redactions[]) once the folder exists.
