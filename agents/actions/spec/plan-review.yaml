# Active action specification: plan-review (read-only "is this plan ready to build?" audit).
#
# FAITHFUL encoding of the plan-review action under the Feature Evidence Contract (see
# agents/actions/plan-review.md and CONSUMER-CONTRACT.md). plan-review is a READ-ONLY
# post-plan readiness audit: it writes a base run package with plan-review-report.md and
# never writes plan or feature evidence artifacts — so its scope is read-only-audit.
# render-prompts.py compiles both prompt variants from this file; run prompt_drift after edits.
action: plan-review
action_doc: agents/actions/plan-review.md
contract:
  name: Feature Evidence Contract
  scope: read-only-audit
  version: "2026-07-11"

run_id:
  scheme: contract
  var: PLAN_REVIEW_RUN_ID

inputs:
  required:
    - {name: PLAN_SCOPE, enum: [feature, feature-set, project]}
    - {name: TARGET, format: "F#### | comma-separated F#### list | project"}
  optional:
    - {name: DIFF_RANGE, format: "SCM range for changed planning artifacts"}
    - {name: PRODUCT_ROOT, default: sister-repo}

auto_resolved:
  PLAN_REVIEW_RUN_FOLDER: "{PRODUCT_ROOT}/planning-mds/operations/evidence/runs/{PLAN_REVIEW_RUN_ID}"
  FEATURE_SLUG: "kebab-case slug for TARGET from REGISTRY.md when PLAN_SCOPE=feature"
  FEATURE_PATH: "{PRODUCT_ROOT}/planning-mds/features/{TARGET}-{FEATURE_SLUG} when PLAN_SCOPE=feature"

context_load:
  - "agents/ROUTER.md"
  - "agents/agent-map.yaml"
  - "agents/docs/AGENT-USE.md"
  - "agents/actions/plan-review.md"
  - "agents/actions/plan.md"
  - "agents/actions/feature.md"
  - "role SKILLs: agents/product-manager/SKILL.md, agents/architect/SKILL.md, agents/code-reviewer/SKILL.md"
  - "feature scope: {FEATURE_PATH}/**; plus BLUEPRINT.md, REGISTRY.md, ROADMAP.md, KG + architecture/API/schema/security artifacts as needed"

ownership:
  product-manager: ["Product Readiness section findings"]
  architect: ["Architecture Readiness section findings"]
  code-reviewer: ["Buildability Challenge section findings"]

gates:
  - id: PR0
    title: Scope lock
    role: product-manager
    artifacts: [action-context.md]
    judgment: |
      Record PLAN_SCOPE, TARGET, DIFF_RANGE, the resolved paths, and the review boundaries in
      action-context.md. Use lookup.py for feature routing when PLAN_SCOPE includes a feature — treat its
      output as first-pass context only, never authoritative over raw artifacts.

  - id: PR1
    title: Parallel readiness review
    role: product-manager
    artifacts: [plan-review-report.md]
    judgment: |
      Three role lanes in parallel (each owns its report section): PM — requirements, stories, mutation
      contracts, UI/screen readiness, trackers; Architect — API/schema, data/workflow, authorization, ADR/NFR,
      KG/ontology alignment; Code Reviewer — vertical-slice buildability, role handoffs, testability,
      dependencies, risk hotspots. Do NOT require feature-assembly-plan.md as a plan deliverable. Reviewers do
      not repair plan artifacts during review.

  - id: PR2
    title: Validator pass
    role: product-manager
    operations:
      - run:
          id: pr2-validate-stories
          argv: [python3, agents/product-manager/scripts/validate-stories.py, "{FEATURE_PATH}"]
          cwd: framework
          timeout_seconds: 300
      - run:
          id: pr2-validate-trackers
          argv: [python3, agents/product-manager/scripts/validate-trackers.py]
          cwd: framework
          timeout_seconds: 300
      - run:
          id: pr2-kg-validate
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py"]
          cwd: product
          timeout_seconds: 300
      - run:
          id: pr2-kg-check-drift
          argv: [python3, "{PRODUCT_ROOT}/scripts/kg/validate.py", --check-drift]
          cwd: product
          timeout_seconds: 300
      - run:
          id: pr2-validate-templates
          argv: [python3, agents/scripts/validate_templates.py]
          cwd: framework
          timeout_seconds: 300
    judgment: |
      validate-stories.py {FEATURE_PATH} applies in feature scope; iterate it per feature for feature-set and
      skip it (record why) for project scope. All PR2 validators are read-only. Record exit code, summary, and
      artifact path for each command in lifecycle-gates.log.

  - id: PR3
    title: Self-review gate
    role: product-manager
    judgment: |
      Each reviewer verifies that its findings cite exact files/sections and that any skipped item is
      explicitly justified. Do not downgrade missing build-critical detail to low severity.

  - id: PR4
    title: Readiness gate
    role: product-manager
    judgment: |
      Compute the readiness verdict with gate_policy.py (profile review-family): critical > 0 -> NOT READY;
      critical = 0 and high > 0 -> CONDITIONALLY READY; critical = 0 and high = 0 -> READY. A missing
      build-critical owner is NOT READY.

severity_gate: review-family

variants: [operator-friendly, automation-safe]

forbidden:
  - "Generate PLAN_REVIEW_RUN_ID with uuid4."
  - "Edit plan artifacts, KG artifacts, trackers, stories, contracts, schemas, architecture files, or product source files."
  - "Write into any feature evidence package."
  - "Approve from prior approval tokens, summaries, or checklists without raw artifact inspection."
  - "Treat lookup/KG mappings as authoritative over raw artifacts."
  - "Require feature-assembly-plan.md as a plan deliverable."
  - "Downgrade missing build-critical detail to low severity."
  - "Widen review scope outside PLAN_SCOPE and TARGET except to record discovered impact."

stop_conditions:
  - "The target scope cannot be identified."
  - "Required raw artifacts are missing and cannot be located."
  - "lookup.py returns only ambiguous or low-confidence matches for the declared target."
  - "A validator failure prevents evidence-backed readiness."
  - "Reviewers cannot cite concrete files/sections for PR4."

conflict_resolution:
  - "raw artifact vs KG mapping -> raw wins; record a KG drift finding."
  - "prior approval vs current artifact gap -> the current artifact gap wins."
  - "PM and Architect disagree -> record both and escalate at PR4."
  - "missing build-critical owner -> NOT READY."

notes:
  session_setup: |
    Echo the resolved absolute {PRODUCT_ROOT} on the first turn. Generate PLAN_REVIEW_RUN_ID once in contract
    format (an ISO YYYY-MM-DD date plus a secrets.token_hex(4) suffix); never uuid4. Create
    PLAN_REVIEW_RUN_FOLDER and its artifacts/ and initialize the six §8 base run files (README.md,
    action-context.md, artifact-trace.md, gate-decisions.md, commands.log, lifecycle-gates.log).
  preconditions: |
    plan.md completed for TARGET; Phase A and Phase B approval decisions are recorded (or missing approvals are
    in review scope); tracker sync and ontology sync completed (or their failures are in review scope); TARGET
    resolves to concrete feature, feature-set, or project planning artifacts.
  report_sections: |
    plan-review-report.md required sections: Decision; Findings By Severity; Product Readiness; Architecture
    Readiness; Buildability Challenge; Validation Evidence; Artifact Trace. README.md summarizes the readiness
    state and open follow-ups; gate-decisions.md records PR0 through PR4.
  read_only: |
    plan-review READS but never writes plan / KG / tracker / feature evidence artifacts. Repair ownership stays
    with the original lifecycle owners (plan.md / targeted rework); reviewers never repair during review — a
    NOT READY / CONDITIONALLY READY verdict routes the fix back to the owner.
  telemetry: |
    Append every shell command to {PLAN_REVIEW_RUN_FOLDER}/commands.log per the §13 JSONL schema
    (schema_version, timestamp with timezone, cwd, command, exit_code, artifacts[], redactions[]).
